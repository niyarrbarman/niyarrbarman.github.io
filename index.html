<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link type="text/css" rel="stylesheet" href="styles.css" />
    <link rel="icon" href="/src/logo_title.png" type="image/icon type">
    <title>Niyar R Barman</title>
</head>
<body>
    <div id = "wrapper">
        <section id = "Home">
            <div class="navbar-container">
                <div class="navbar">
                    <div class="navbar-left">
                        <a href="#Home"><img class = "logo" src="/src/logo.png" alt=""></a>
                    </div>
                    <div class="navbar-right">
                        <div class = "navb"><a href="">About</a></div>
                        <div class = "navb"><a href="">Portfolio</a></div>
                        <div class = "navb"><a href="">Publications</a></div>
                        <div class="sign-in"><a href="/src/Resume - Niyar R Barman.pdf" class = "resume">Resume</a></div>
                        <div class="join-now">
                            <a href="#modalbox">Contact</a>
                        </div>
                        <div class="modal" id="modalbox">
                            <div class="modalcontent">
                                <form class = "form" onsubmit="sendEmail(); reset(); return false;">
                                    <h3 class = "form-h3">Let's Talk!</h3>
                                    <input class = "contact-form" type="text" id="name" placeholder="Your Name" required><br>
                                    <input class = "contact-form"  type="email" id="email" placeholder="Email ID" required><br>
                                    <input class = "contact-form"  type="text" id="phone" placeholder="Phone No." required><br>
                                    <textarea class = "contact-form" id="message" cols="60" rows="6" placeholder="Your Message" required ></textarea><br>
                                    <button class = "contact-form" type="submit" style="margin-bottom: 30px;">Send</button>
                                </form>                                
                                <a href="#" class="modalclose">×</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id = "#">
            
            <div class = "naf-container">
                <div class="socials">
                    <a href="https://www.linkedin.com/in/niyar/">
                        <img class = "logos" src="https://cdn-icons-png.flaticon.com/512/174/174857.png" alt="Niyar LinkedIn">
                    </a>
                    <a href="https://github.com/niyarrbarman">
                        <img class = "logos" src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Niyar GitHub" >
                    </a>
                    <a href="mailto: barmanniyar@gmail.com">
                        <img class = "logos" src="https://cdn.cdnlogo.com/logos/g/37/gmail-icon.svg" alt ="Niyar Email">
                    </a>
                </div>
            </div>

        </section>
    </div>
<script src="https://smtpjs.com/v3/smtp.js"></script>   
<script>
    function sendEmail(){
        Email.send({
            Host : "",
            Username : "",
            Password : "",
            To : "",
            From : document.getElementById("email").value,
            Subject : "New Enquiry from Website",
            Body : "Name : "+document.getElementById("name").value+
                   "<br>Email : "+document.getElementById("email").value+
                   "<br>Phone No. : "+document.getElementById("phone").value+
                   "<br>Message : "+document.getElementById("message").value
        }).then(
        message => alert("Message Sent Successfully")
        );
    }
</script>
</body>
</html>
